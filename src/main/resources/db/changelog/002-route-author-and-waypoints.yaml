databaseChangeLog:
  - changeSet:
      id: 002-add-author
      author: rafal
      changes:
        - addColumn:
            tableName: routes
            columns:
              - column:
                  name: author_id
                  type: uuid
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-route-waypoints
      author: rafal
      changes:
        - createTable:
            tableName: route_waypoints
            columns:
              - column:
                  name: route_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: seq
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: double precision
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: double precision
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: route_waypoints
            columnNames: route_id, seq
            constraintName: pk_route_waypoints
        - addForeignKeyConstraint:
            baseTableName: route_waypoints
            baseColumnNames: route_id
            referencedTableName: routes
            referencedColumnNames: id
            constraintName: fk_waypoints_route
            onDelete: CASCADE

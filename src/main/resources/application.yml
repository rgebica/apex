spring:
  application:
    name: apex
  profiles:
    # Domyslny profil dla uruchomien lokalnych (mvn spring-boot:run).
    # W kontenerze nadpisywany na 'prod' przez SPRING_PROFILES_ACTIVE.
    active: dev
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080
